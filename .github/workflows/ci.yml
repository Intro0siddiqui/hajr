name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: zig build
        run: zig build

      - name: Run cross-thread IPC benchmark
        run: zig build benchmark

      - name: Run tests (Linux only)
        if: runner.os == 'Linux'
        run: |
          zig build test 2>&1 || true
          TEST_BIN=$(ls .zig-cache/o/*/test 2>/dev/null | head -1)
          if [ -n "$TEST_BIN" ]; then
            $TEST_BIN 2>&1
          fi
