name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Clean zig cache
        if: runner.os != 'Windows'
        run: rm -rf .zig-cache

      - name: Clean zig cache (Windows)
        if: runner.os == 'Windows'
        run: Remove-Item -Recurse -Force .zig-cache -ErrorAction SilentlyContinue

      - name: zig build
        run: zig build

      - name: Run cross-thread IPC benchmark
        run: zig build benchmark

      - name: Run tests
        run: zig build test --summary all

  cross-aarch64-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build for aarch64-linux
        run: zig build -Dtarget=aarch64-linux-gnu
