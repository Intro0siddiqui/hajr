name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: ziglang/setup-zig@v2
        with:
          version: master

      - name: zig build
        run: zig build

  test-linux:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: ziglang/setup-zig@v2
        with:
          version: master

      - name: Compile tests
        run: zig build test

      - name: Run tests
        run: |
          TEST_BIN=$(ls .zig-cache/o/*/test 2>/dev/null | head -1)
          if [ -n "$TEST_BIN" ]; then
            $TEST_BIN 2>&1
          else
            echo "test binary not found, running via zig build test"
            zig build test 2>&1
          fi
